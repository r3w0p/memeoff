<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>memeoff</title>

    <link rel="shortcut icon" href="img/icon.png">

    <!-- THIRD-PARTY -->
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-exp.min.css">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-icons.min.css">
    <!-- FONTS -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat&display=swap">
    <!-- CUSTOM -->
    <link rel="stylesheet" href="style.css">
  </head>

  <body>

    <!-- LOGIN -->
    <div id="login-page">
      <div class="form">
        <h3 id="login-page-title" class="login-text">What's your nickname?</h3>

        <!-- INPUT USERNAME -->
        <input id="input-username" class="login-text" type="text" maxlength="14" />

        <br><br>
        <h3 id="login-page-error" class="login-text"></h3>
      </div>
    </div>

    <!-- GAME -->
    <div id="game-page">


      <!-- NAV BAR -->
      <header id="game-navbar" class="navbar shadow">
        <section class="navbar-section notify">
          <button class="btn btn-link">
            <span id="nav-timer" class="nav-text"></span>
          </button>
        </section>

        <section class="navbar-center logo">
          <img id="nav-logo" src="img/logo.png">
        </section>

        <section class="navbar-section players">
          <div class="dropdown dropdown-right">
            <button class="btn btn-link dropdown-toggle">
              <span id="player-list-text" class="nav-text"></span>
              <span class="nav-text">😃</span>
            </button>
            <ul class="menu" id="player-list"></ul>
          </div>
        </section>
      </header>




      <div id="game-area">


        <div class="hero" id="game-area-players" style="z-index: 3;">
          <div class="empty">
            <p class="empty-title emoji">😴</p>
            <p class="empty-title message">Waiting for more players....</p>
          </div>
        </div>




        <div class="hero" id="game-area-start" style="z-index: 4;">
          <div class="empty">
            <p class="empty-title emoji">😎</p>
            <p class="empty-title message">Starting new game....</p>
          </div>
        </div>




        <div id="game-area-submit" style="z-index: 5;">

          <div class="container">
            <div class="columns">

              <div class="column col-4 col-xl-0"></div>

              <div class="column col-4 col-xl-12 memecard submit">
                <div class="card shadow">
                  <div class="card-header">

                    <div class="container">
                      <div class="columns">

                        <div class="column col-8">
                          <textarea id="input-game"
                                    class="submit-text"
                                    maxlength="140"
                                    placeholder="Type here (max 140 chars)."></textarea>
                        </div>

                        <div class="column col-2">
                          <button class="btn btn-primary btn-action btn-lg submit badge"
                                  id="input-game-submit"
                                  style="width: 100%; height: 100%;"
                                  data-badge="0">
                            <i class="icon icon-check"></i>
                          </button>
                        </div>

                        <div class="column col-2">
                          <button class="btn btn-action btn-lg submit badge"
                                  id="input-game-skip"
                                  style="width: 100%; height: 100%;"
                                  data-badge="0">
                            <i class="icon icon-refresh"></i>
                          </button>
                        </div>

                      </div>
                    </div> <!-- container -->

                  </div>

                  <div class="card-image" id="submit-image-container">
                    <!-- <img class="img-responsive" src="img/bruh.jpg" width="100%"> -->
                  </div>
                </div>
              </div> <!-- memecard -->

              <div class="column col-4 col-xl-0"></div>

            </div>
          </div>

        </div> <!-- game-area-dur_submit -->







        <div id="game-area-vote" style="z-index: 6;">

          <div class="container">
            <div class="columns" id="vote-card-container"></div>
          </div>

        </div> <!-- game-area-vote -->




        <div id="game-area-winner" style="z-index: 7;">

          <div class="columns" id="winner-card-container"></div>

        </div> <!-- -->

    </div>

    <script src="https://code.jquery.com/jquery-1.10.2.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/main.js"></script>
  </body>
</html>
